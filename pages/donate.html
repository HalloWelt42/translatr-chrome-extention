<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Translator - Danke sagen</title>
  <link rel="stylesheet" href="donate.css">
</head>
<body>
  <div class="donate-page">
    <div class="donate-header">
      <span class="icon">&#x2615;</span>
      <h1 data-i18n="donateTitle">Mit Liebe gemacht</h1>
      <p data-i18n="donateSubtitle">Open Source. Kein Tracking, keine Werbung, keine Kompromisse.</p>
    </div>

    <a id="kofi-btn" href="" target="_blank" rel="noopener" class="kofi-btn">
      <span class="kofi-icon">&#x2615;</span>
      <span data-i18n="donateKofi">Ko-fi - Kauf mir einen Kaffee</span>
    </a>

    <p class="crypto-label" data-i18n="donateCryptoLabel">Oder per Kryptowährung:</p>

    <div class="crypto-tabs">
      <button class="crypto-tab active" data-crypto="btc">
        <span class="coin-icon">&#x20BF;</span> Bitcoin
      </button>
      <button class="crypto-tab" data-crypto="doge">
        <span class="coin-icon">&#xD0;</span> Dogecoin
      </button>
      <button class="crypto-tab" data-crypto="eth">
        <span class="coin-icon">&#x039E;</span> Ethereum
      </button>
    </div>

    <div class="crypto-content active" id="crypto-btc">
      <div class="crypto-box">
        <div class="qr-code" id="btc-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Bitcoin (BTC)</p>
          <p class="crypto-address" id="btc-address"></p>
          <button class="copy-btn" data-coin="btc"><span data-i18n="donateCopyAddress">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <div class="crypto-content" id="crypto-doge">
      <div class="crypto-box">
        <div class="qr-code" id="doge-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Dogecoin (DOGE)</p>
          <p class="crypto-address" id="doge-address"></p>
          <button class="copy-btn" data-coin="doge"><span data-i18n="donateCopyAddress">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <div class="crypto-content" id="crypto-eth">
      <div class="crypto-box">
        <div class="qr-code" id="eth-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Ethereum (ETH)</p>
          <p class="crypto-address" id="eth-address"></p>
          <button class="copy-btn" data-coin="eth"><span data-i18n="donateCopyAddress">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <div class="donate-footer" data-i18n="donateFooter">Danke für deine Unterstützung!</div>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="donate-config.js"></script>
  <script src="donate.js"></script>
</body>
</html>
