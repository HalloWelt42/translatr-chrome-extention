<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Translator</title>
  <link rel="stylesheet" href="../pages/page-common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-header">
    <span data-swt-icon="translate"></span>
    <h1>Smart Translator</h1>
    <div class="header-badges">
      <div class="api-badge" id="apiBadge">
        <span class="led led-off" id="apiLed"></span>
        <span id="apiBadgeText">Libre</span>
        <span class="api-badge-source hidden" id="apiBadgeSource"></span>
      </div>
      <div class="api-badge" id="cacheBadge">
        <span class="led led-off" id="cacheLed"></span>
        <span id="cacheBadgeText">Cache</span>
      </div>
      <a href="#" class="header-info-btn" id="openGuide">
        <span data-swt-icon="info"></span>
      </a>
    </div>
  </div>

  <div class="content">
    <div class="cache-status hidden" id="cacheStatus">
      <div class="info">
        <span class="size" id="cacheSize">0 KB</span>
        <span class="hint" id="cacheHint" data-i18n="popupCacheHint">Cache für diese Seite verfügbar</span>
      </div>
      <button id="loadCacheBtn" class="cache-load-btn">
        <span data-swt-icon="download"></span>
        <span data-i18n="popupLoadCache">Cache laden</span>
      </button>
    </div>

    <div class="lang-row">
      <select id="sourceLang"></select>
      <button class="swap-btn" id="swapLangs">
        <span data-swt-icon="swap"></span>
      </button>
      <select id="targetLang"></select>
    </div>

    <textarea id="inputText" data-i18n-placeholder="popupInputPlaceholder" placeholder="Text zum Übersetzen eingeben..."></textarea>

    <button class="btn btn-primary fullwidth" id="translateBtn">
      <span data-swt-icon="translate"></span>
      <span data-i18n="popupTranslate">Übersetzen</span>
    </button>

    <div class="result-box" id="resultBox"></div>
    <div class="result-actions hidden" id="resultActions">
      <button class="result-action" id="copyResult">
        <span data-swt-icon="copy"></span>
        <span data-i18n="btnCopy">Kopieren</span>
      </button>
      <button class="result-action" id="speakResult">
        <span data-swt-icon="volumeUp"></span>
        <span data-i18n="btnReadAloud">Vorlesen</span>
      </button>
    </div>

    <div class="divider"></div>

    <div class="actions-grid">
      <div class="action-card" id="translatePage">
        <span data-swt-icon="document"></span>
        <span data-i18n="btnTranslatePage">Seite übersetzen</span>
      </div>
      <div class="action-card" id="restorePage">
        <span data-swt-icon="refresh"></span>
        <span data-i18n="statusOriginal">Original</span>
      </div>
      <div class="action-card" id="openSidepanel">
        <span data-swt-icon="panel"></span>
        <span data-i18n="popupPanel">Panel</span>
      </div>
      <div class="action-card donate-card" id="openDonateCard">
        <span data-swt-icon="heart"></span>
        <span data-i18n="popupThanks">Danke</span>
      </div>
    </div>

  </div>

  <div class="app-footer">
    <a href="#" id="openOptions"><span data-swt-icon="gear"></span> <span data-i18n="ctxSettings">Einstellungen</span></a>
    &nbsp;·&nbsp;
    <a href="#" id="manageCache"><span data-i18n="popupManageCache">Cache verwalten</span></a>
    &nbsp;·&nbsp;
    <a href="#" id="openGithub" class="github-link"><span data-swt-icon="github"></span></a>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="../shared/toast.js"></script>
  <script src="../shared/api-badge.js"></script>
  <script src="../shared/cache-server.js"></script>
  <script src="../shared/icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
