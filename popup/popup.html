<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Translator</title>
  <link rel="stylesheet" href="../pages/page-common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-header">
    <span data-swt-icon="translate"></span>
    <h1>Smart Translator</h1>
    <div class="header-badges">
      <div class="api-badge" id="apiBadge">
        <span class="led led-off" id="apiLed"></span>
        <span id="apiBadgeText">Libre</span>
      </div>
      <div class="api-badge" id="cacheBadge">
        <span class="led led-off" id="cacheLed"></span>
        <span id="cacheBadgeText">Cache</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="cache-status hidden" id="cacheStatus">
      <div class="info">
        <span class="size" id="cacheSize">0 KB</span>
        <span class="hint" id="cacheHint">Cache für diese Seite verfügbar</span>
      </div>
      <button id="loadCacheBtn" class="cache-load-btn">
        <span data-swt-icon="download"></span>
        Cache laden
      </button>
    </div>

    <div class="lang-row">
      <select id="sourceLang">
        <option value="auto">Automatisch</option>
        <option value="en">Englisch</option>
        <option value="de">Deutsch</option>
        <option value="fr">Französisch</option>
        <option value="es">Spanisch</option>
        <option value="it">Italienisch</option>
        <option value="pt">Portugiesisch</option>
        <option value="ru">Russisch</option>
        <option value="zh">Chinesisch</option>
        <option value="ja">Japanisch</option>
      </select>
      <button class="swap-btn" id="swapLangs">
        <span data-swt-icon="swap"></span>
      </button>
      <select id="targetLang">
        <option value="de">Deutsch</option>
        <option value="en">Englisch</option>
        <option value="fr">Französisch</option>
        <option value="es">Spanisch</option>
        <option value="it">Italienisch</option>
        <option value="pt">Portugiesisch</option>
        <option value="ru">Russisch</option>
        <option value="zh">Chinesisch</option>
        <option value="ja">Japanisch</option>
      </select>
    </div>

    <textarea id="inputText" placeholder="Text zum Übersetzen eingeben..."></textarea>

    <button class="btn btn-primary fullwidth" id="translateBtn">
      <span data-swt-icon="translate"></span>
      Übersetzen
    </button>

    <div class="result-box" id="resultBox"></div>
    <div class="result-actions hidden" id="resultActions">
      <button class="result-action" id="copyResult">
        <span data-swt-icon="copy"></span>
        Kopieren
      </button>
      <button class="result-action" id="speakResult">
        <span data-swt-icon="volumeUp"></span>
        Vorlesen
      </button>
    </div>

    <div class="divider"></div>

    <div class="actions-grid">
      <div class="action-card" id="translatePage">
        <span data-swt-icon="document"></span>
        <span>Seite übersetzen</span>
      </div>
      <div class="action-card" id="restorePage">
        <span data-swt-icon="refresh"></span>
        <span>Original</span>
      </div>
      <div class="action-card" id="exportPdf">
        <span data-swt-icon="pdf"></span>
        <span>Export</span>
      </div>
      <div class="action-card" id="openSidepanel">
        <span data-swt-icon="panel"></span>
        <span>Panel</span>
      </div>
    </div>

    <div class="shortcuts" id="shortcutsSection">
      <h3>Tastenkürzel</h3>
    </div>
  </div>

  <div class="app-footer">
    <a href="#" id="openOptions">Einstellungen</a>
    &nbsp;·&nbsp;
    <a href="#" id="manageCache">Cache verwalten</a>
    &nbsp;·&nbsp;
    <a href="#" id="openDonate">Danke sagen</a>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="../shared/toast.js"></script>
  <script src="../shared/api-badge.js"></script>
  <script src="../shared/cache-server.js"></script>
  <script src="../shared/icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
